# SDK 文档构建模板配置文件
# 复制此文件为 config.yaml 并根据项目需求修改

project:
  name: "Your_SDK_Docs"  # 修改为你的SDK名称
  title: "Your SDK 文档"  # 修改为你的SDK标题
  description: "Your SDK 提供了丰富的示例项目，包括基础功能、驱动示例和组件示例。"  # 修改描述
  version: "0.0.1"  # 修改版本号
  author: "your_name"  # 修改作者
  copyright: "2025, your_company"  # 修改版权信息
  language: "zh_CN"  # 支持的语言

# 仓库配置
repository:
  name: "your-sdk-repo"  # 修改为你的仓库名称
  projects_dir: "../projects"  # 项目目录路径
  docs_dir: "."  # 文档输出目录

# 文档分类配置 - 根据你的项目调整分类和模式
categories:
  basic:
    name: "基础篇"
    description: "基础功能示例"
    patterns:
      - "your_basic_*"  # 修改为你的项目命名模式
      - "your_blink_led"
      - "your_factory"
  
  driver:
    name: "驱动篇"
    description: "外设驱动示例"
    patterns:
      - "your_driver_*"  # 修改为你的驱动项目命名模式
      - "your_usb_*"
  
  component:
    name: "组件篇"
    description: "网络组件示例"
    patterns:
      - "your_component_*"  # 修改为你的组件项目命名模式
  
  protocol:
    name: "工业协议篇"
    description: "工业协议示例"
    patterns:
      - "your_ethercat_*"  # 修改为你的协议项目命名模式
      - "your_modbus_*"
      - "your_profinet_*"
      - "your_ethernetip_*"
      - "your_ethernet"

# 文档生成配置
generation:
  copy_files:
    - "README.md"
    - "README_zh.md"
  copy_dirs:
    - "figures"
  output_structure:
    - "basic"
    - "driver"
    - "component"
    - "protocol"

# Sphinx 配置
sphinx:
  theme: "sphinx_rtd_theme"
  extensions:
    - "myst_parser"
  source_suffix:
    ".rst": "restructuredtext"
    ".md": "markdown"
  myst_extensions:
    - "colon_fence"
    - "deflist"
    - "dollarmath"
    - "html_image"
    - "html_admonition"
    - "replacements"
    - "smartquotes"
    - "strikethrough"
    - "substitution"
    - "tasklist" 